name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: metronome-windows-portable
            binary_name: MetronomeApp.exe
            archive_name: MetronomeApp-windows-portable.zip

          - os: macos-latest
            artifact_name: metronome-macos
            binary_name: MetronomeApp
            archive_name: MetronomeApp-macos.zip

          - os: ubuntu-latest
            artifact_name: metronome-linux
            binary_name: MetronomeApp
            archive_name: MetronomeApp-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Build release binary
        working-directory: MetronomeApp
        run: cargo build --release

      - name: Create package directory
        shell: bash
        run: |
          mkdir package
          cp "MetronomeApp/target/release/${{ matrix.binary_name }}" package/

          if [ -d "MetronomeApp/target/release/assets" ]; then
            cp -r MetronomeApp/target/release/assets package/assets
          fi

      - name: Create Windows/macOS portable package
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cd package
          7z a "../${{ matrix.archive_name }}" *

      - name: Create Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd package
          chmod +x "${{ matrix.binary_name }}"
          tar -czf "../${{ matrix.archive_name }}" *

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  windows-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset -y

      - name: Install cargo-wix
        working-directory: MetronomeApp
        run: cargo install cargo-wix

      - name: Build MSI installer
        working-directory: MetronomeApp
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $WixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          $Heat = Join-Path $WixBin "heat.exe"

          Write-Host "Building Rust release..."
          cargo build --release

          Write-Host "Regenerating wix\assets.wxs..."
          & $Heat dir "target\release\assets" `
            -cg AssetsComponents `
            -dr AssetsFolder `
            -srd `
            -sfrag `
            -ag `
            -template fragment `
            -var var.CargoTargetBinDir `
            -out "wix\assets.wxs"

          Write-Host "Patching generated asset paths..."
          $assetsWxs = "wix\assets.wxs"
          $content = Get-Content $assetsWxs -Raw
          $content = $content.Replace('$(var.CargoTargetBinDir)\', '$(var.CargoTargetBinDir)\assets\')
          Set-Content $assetsWxs $content -Encoding UTF8

          Write-Host "Building MSI..."
          cargo wix --bin-path $WixBin --nocapture

      - name: Copy MSI installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer
          Copy-Item "MetronomeApp\target\wix\*.msi" "installer\MetronomeApp-windows-installer.msi"

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: metronome-windows-installer
          path: installer/MetronomeApp-windows-installer.msi

  github-release:
    needs:
      - build
      - windows-installer

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*